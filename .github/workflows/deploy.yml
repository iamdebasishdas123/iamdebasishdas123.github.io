# GitHub Actions workflow to deploy Portfolio to GitHub Pages
# Injects EmailJS keys from GitHub Secrets at build time
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   EMAILJS_PUBLIC_KEY   — Your EmailJS Public Key
#   EMAILJS_SERVICE_ID   — Your EmailJS Service ID
#   EMAILJS_TEMPLATE_ID  — Your EmailJS Template ID

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject EmailJS keys into index.html
        env:
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
        run: |
          python3 - <<'PY'
          import os
          p = 'index.html'
          with open(p, 'r', encoding='utf-8') as f:
              s = f.read()
          # Replace placeholders with environment secrets (handles arbitrary characters safely)
          s = s.replace('EMAILJS_PUBLIC_KEY', os.environ.get('EMAILJS_PUBLIC_KEY',''))
          s = s.replace('EMAILJS_SERVICE_ID', os.environ.get('EMAILJS_SERVICE_ID',''))
          s = s.replace('EMAILJS_TEMPLATE_ID', os.environ.get('EMAILJS_TEMPLATE_ID',''))
          with open(p, 'w', encoding='utf-8') as f:
              f.write(s)
          print('Replaced EmailJS placeholders in', p)
          PY

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
