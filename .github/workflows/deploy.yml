# GitHub Actions workflow to deploy Portfolio to GitHub Pages
# Injects EmailJS keys from GitHub Secrets at build time
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   EMAILJS_PUBLIC_KEY   — Your EmailJS Public Key
#   EMAILJS_SERVICE_ID   — Your EmailJS Service ID
#   EMAILJS_TEMPLATE_ID  — Your EmailJS Template ID

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject EmailJS keys into index.html
        run: |
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('index.html', 'utf8');
          content = content.replace(/{{EMAILJS_PUBLIC_KEY}}/g, '${{ secrets.EMAILJS_PUBLIC_KEY }}');
          content = content.replace(/{{EMAILJS_SERVICE_ID}}/g, '${{ secrets.EMAILJS_SERVICE_ID }}');
          content = content.replace(/{{EMAILJS_TEMPLATE_ID}}/g, '${{ secrets.EMAILJS_TEMPLATE_ID }}');
          fs.writeFileSync('index.html', content);
          "

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
